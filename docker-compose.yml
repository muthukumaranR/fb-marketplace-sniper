services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  backend:
    build: .
    ports:
      - "8000:8000"
    shm_size: "256mb"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_PATH=/app/data/sniper.db
      - FB_STATE_PATH=/app/data/fb_state.json
    volumes:
      - app-data:/app/data
      - ~/.config/sniper/fb_state.json:/app/data/fb_state.json:ro
    depends_on:
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    command: uv run celery -A backend.celery_app worker --beat -l info
    shm_size: "256mb"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_PATH=/app/data/sniper.db
      - FB_STATE_PATH=/app/data/fb_state.json
    volumes:
      - app-data:/app/data
      - ~/.config/sniper/fb_state.json:/app/data/fb_state.json:ro
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  app-data:
